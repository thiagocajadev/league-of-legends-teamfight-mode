name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# why: dois runs em paralelo se destroem. Em 2026-07-20 as tags v2.0.1 e v2.0.2
# rodaram no mesmo segundo: cada uma criou a sua release e o prune de cada uma
# apagou a da outra, deixando o repositorio com zero releases e levando a v1.1.0
# junto. Group fixo (nao por tag) serializa tudo em um run so, e cancel-in-progress
# mata a release antiga em voo, que nao tem valor sob a politica de manter so a
# ultima.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # why: sem release anterior para recuar, publicar versao errada nao tem desfazer.
      # O guard trava antes de criar qualquer coisa.
      - name: Check version matches tag
        run: |
          for file in bat/*.bat; do
            grep -qF ":: league-of-legends-teamfight-mode - $GITHUB_REF_NAME" "$file" \
              || { echo "::error file=$file::version header does not match tag $GITHUB_REF_NAME"; exit 1; }
          done

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" bat/*.bat --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # why: politica de manter so a ultima versao publicada, release e tag.
      # Release antes da tag: apagar a tag primeiro deixaria a release orfa,
      # que o GitHub rebaixa para draft em vez de remover.
      # A tag some, entao o commit daquela versao deixa de ter nome. O historico
      # continua no CHANGELOG.md, que passa a ser o unico registro das versoes
      # anteriores.
      - name: Prune previous releases and tags
        run: |
          gh release list --json tagName --jq '.[].tagName' \
            | grep -vxF "$GITHUB_REF_NAME" \
            | xargs -r -I{} gh release delete {} --yes

          # why: lista pela API e nao por `git tag -l`, que so enxerga o que o
          # checkout trouxe. O checkout padrao e raso e nao busca as outras tags.
          gh api "repos/$GITHUB_REPOSITORY/git/refs/tags" --jq '.[].ref' \
            | sed 's#^refs/tags/##' \
            | grep -vxF "$GITHUB_REF_NAME" \
            | xargs -r -I{} gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/{}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
